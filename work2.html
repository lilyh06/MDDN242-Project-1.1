<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Personal Work</title>
  <link rel="stylesheet" href="styles.css">
   <link href="https://fonts.googleapis.com/css2?family=Lexend+Exa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .project-page {
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
      font-family: "Lexend Exa", sans-serif;
    }

    .project-title {
      color: white;
      padding: 20px;
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 30px;
    }

.project-images {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 5px;
  margin-bottom: 30px;
}

.project-images img {
  width: 70%;
  height: auto;
  object-fit: cover;
}

.project-blurb {
 color: white;
 padding: 20px;
 font-size: 1rem;
 line-height: 1.5;
 }

.project-home-button {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-family: "Lexend Exa", sans-serif;
  font-size: 1.2rem;
  color: white;
  text-decoration: none;
  padding: 5px 10px;
  z-index: 9999;
  transition: color 0.2s ease;
}

.project-home-button:hover {
  color: #FBB03B;
  cursor: pointer;
}

.page-croc {
  display: block;
  margin: 60px auto 0 auto;
  width: 1800px;
  max-width: 100%;
}

  </style>
</head>
<body>

 <a href="index.html" class="project-home-button">SWIM BACK HOME</a>

<div class="project-page">
  <div class="project-title">
  Personal Work
  </div>

 <div class="project-images">
  <img src="drawing1.png" alt="Image 1">
  <img src="drawing2.png" alt="Image 2">
  <img src="drawing3.png" alt="Image 3">
  <img src="drawing4.png" alt="Image 4">
</div>

  <div class="project-blurb">
    During my first two weeks in Wellington at the beginning of 2025, I challenged myself to create one drawing each day.      These were done in an A6 sketchbook using Posca paint pens and ink fine liners.
  </div>
</div>

<img src="crocodilefull.png" alt="" class="page-croc">

</body>
</html>
