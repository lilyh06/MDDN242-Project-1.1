<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page Not Found</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #FBB03B;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: "Lexend Exa", sans-serif;
    }

    /* Top‑center button */
    .home-button {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      color: #9e1f63;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      text-decoration: none;
      border: 2px solid #9e1f63;
      transition: 0.2s ease;
      cursor: pointer;
    }

    .home-button:hover {
      background: #9e1f63;
      color: white;
    }

    /* 404 image */
    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      max-width: 100vw;
      max-height: 100vh;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <a href="index.html" class="home-button">Go Back Home</a>

  <img src="404.png" alt="404 - Page Not Found">

</body>
</html>
