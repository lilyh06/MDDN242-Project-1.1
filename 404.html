<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page Not Found</title>

  <!-- Load Lexend Exa font -->
  <link href="https://fonts.googleapis.com/css2?family=Lexend+Exa:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #FBB03B;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: "Lexend Exa", sans-serif;
    }

    /* Text‑only top‑center link */
    .home-button {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: "Lexend Exa", sans-serif;
      font-size: 1.3rem;
      font-weight: 500;
      color: #9e1f63;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .home-button:hover {
      color: #ffffff;
    }

    /* 404 image */
    img {
      width: 110%;
      height: 110%;
      object-fit: contain;
      max-width: 100vw;
      max-height: 100vh;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <a href="index.html" class="home-button">Back to Home</a>

  <img src="404.png" alt="404 - Page Not Found">

</body>
</html>
